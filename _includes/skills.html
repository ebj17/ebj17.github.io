
<section id="skills" class="skills-section">
    <h2>Skills</h2>
    <div class="skills-tabs">
        <div class="skills-tab-nav">
            {% for skill in site.skills %}
            <button class="skills-tab-btn{% if forloop.first %} active{% endif %}"
                    data-index="{{ forloop.index0 }}">{{ skill.category }}</button>
            {% endfor %}
        </div>
        {% for skill in site.skills %}
        <div class="skills-tab-panel{% if forloop.first %} active{% endif %}"
             data-index="{{ forloop.index0 }}">
            {% for tool in skill.tools %}
            <span class="skill">{{ tool }}</span>
            {% endfor %}
        </div>
        {% endfor %}
    </div>
</section>

<script>
(function () {
    document.querySelectorAll('.skills-tab-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
            var idx = btn.dataset.index;
            document.querySelectorAll('.skills-tab-btn').forEach(function (b) { b.classList.remove('active'); });
            document.querySelectorAll('.skills-tab-panel').forEach(function (p) { p.classList.remove('active'); });
            btn.classList.add('active');
            document.querySelector('.skills-tab-panel[data-index="' + idx + '"]').classList.add('active');
        });
    });
}());
</script>
